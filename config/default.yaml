# config/default.yaml
# All hyperparameters. No hardcoded values in code.

project:
  name: "crossref-extraction"
  seed: 42

device:
  auto_detect: true  # If false, force 'cpu'

model:
  name: "deepset/gbert-large"
  use_crf: false
  freeze_backbone: false
  use_lora: false
  lora_rank: 16

training:
  batch_size: 1
  learning_rate_backbone: 2.0e-5
  learning_rate_head: 1.0e-4
  warmup_steps: 0
  max_grad_norm: 1.0
  num_epochs: 1
  mixed_precision: "no"
  gradient_checkpointing: true  # Trade compute for memory on MPS
  class_weights: "auto"  # "auto" = compute from data, or list like [1.0, 20.0, 10.0]
  validation_split: 0.1  # Fraction of data held out for validation
  early_stopping_patience: 3  # Stop after N epochs without val loss improvement

data:
  max_seq_length: 64
  samples_per_batch: 3
  total_samples: 3
  dataset_path: ""
  negative_sample_ratio: 0.4
  cache_dir: "data/cache"
  gold_test_dir: "data/gold_test"
  llm_seed: 1337
  llm_model: "qwen2.5:7b"
  ollama_endpoint: "http://localhost:11434"

ensemble:
  enabled: false
  n_estimators: 3
  use_gradient_boost: false

evaluation:
  output_dir: "evaluation_output"
