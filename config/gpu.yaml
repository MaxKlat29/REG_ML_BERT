# config/gpu.yaml
# Production training on CUDA GPU (RTX 3090)
# Usage: python run.py train --config config/gpu.yaml
#
# Data generation (run on GPU workstation where Ollama is local):
#   python run.py generate --config config/gpu.yaml --concurrency 4

training:
  batch_size: 16
  learning_rate_backbone: 2.0e-5
  learning_rate_head: 1.0e-4
  warmup_steps: 100
  max_grad_norm: 1.0
  num_epochs: 20
  mixed_precision: "fp16"
  gradient_checkpointing: false

data:
  max_seq_length: 512
  samples_per_batch: 512
  total_samples: 100000
  dataset_path: "data/training_dataset.json"
  llm_model: "qwen2.5:14b"
  ollama_endpoint: "http://localhost:11434"
